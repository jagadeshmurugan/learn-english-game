<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Grammar Quest 📚</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: none;
  }
  #gameWrapper {
    position: relative;
    width: 800px;
    height: 500px;
    max-width: 100vw;
    max-height: 100vh;
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 0 60px rgba(100,200,255,0.3);
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }
  /* HUD overlay */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
    pointer-events: none;
    z-index: 10;
  }
  .hud-block { color: #fff; font-size: 13px; font-weight: bold; text-shadow: 1px 1px 3px #000; }
  .hud-lives span { color: #ff6b6b; }
  .hud-word { color: #ffe66d; letter-spacing: 3px; font-size: 15px; }
  .hud-collected { color: #a8e6cf; }
  /* Screens */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    padding: 20px;
  }
  #titleScreen { background: linear-gradient(135deg, #0f3460 0%, #16213e 50%, #0f3460 100%); }
  #spellingScreen { background: rgba(15,30,80,0.96); }
  #levelCompleteScreen { background: rgba(10,40,20,0.96); }
  #gameOverScreen { background: rgba(60,10,10,0.96); }
  #levelSelectScreen { background: linear-gradient(135deg, #0f3460 0%, #16213e 50%, #0f3460 100%); overflow-y: auto; }
  .screen h1 { font-size: 42px; color: #ffe66d; text-shadow: 2px 3px 0 #b8860b, 0 0 20px rgba(255,230,109,0.5); margin-bottom: 6px; }
  .screen h2 { font-size: 26px; color: #a8e6cf; margin-bottom: 20px; }
  .btn {
    background: linear-gradient(135deg, #e94560, #c0392b);
    color: #fff;
    border: none;
    border-radius: 30px;
    padding: 12px 36px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    margin: 8px;
    box-shadow: 0 4px 15px rgba(233,69,96,0.5);
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 1px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(233,69,96,0.7); }
  .btn:active { transform: translateY(1px); }
  .btn-green { background: linear-gradient(135deg, #27ae60, #1e8449); box-shadow: 0 4px 15px rgba(39,174,96,0.5); }
  .btn-green:hover { box-shadow: 0 6px 20px rgba(39,174,96,0.7); }
  .btn-blue { background: linear-gradient(135deg, #2980b9, #1a6a9a); box-shadow: 0 4px 15px rgba(41,128,185,0.5); }
  /* Spelling challenge */
  #spellingWord { display: flex; gap: 8px; margin: 20px 0; flex-wrap: wrap; justify-content: center; }
  .spell-slot {
    width: 52px; height: 52px;
    border: 3px solid rgba(255,255,255,0.3);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: bold; color: #fff;
    background: rgba(255,255,255,0.05);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .spell-slot.filled { background: rgba(100,200,150,0.2); border-color: #a8e6cf; color: #a8e6cf; }
  .spell-slot.wrong { border-color: #ff6b6b; background: rgba(255,100,100,0.2); animation: shake 0.3s; }
  #letterBank { display: flex; gap: 8px; margin: 15px 0; flex-wrap: wrap; justify-content: center; }
  .bank-letter {
    width: 52px; height: 52px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    border: 3px solid transparent;
  }
  .bank-letter:hover { transform: scale(1.1); }
  .bank-letter.used { opacity: 0.2; cursor: default; transform: none; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
  @keyframes star-pop { 0%{transform:scale(0)opacity:0} 60%{transform:scale(1.3)} 100%{transform:scale(1)opacity:1} }
  .anim-in { animation: fadeIn 0.4s ease forwards; }
  .logo-subtitle { color: #a8e6cf; font-size: 16px; margin-bottom: 30px; letter-spacing: 2px; }
  #levelInfo { color: #ddd; font-size: 14px; margin-bottom: 15px; }
  #spellingFeedback { font-size: 20px; font-weight: bold; min-height: 30px; color: #ffe66d; margin-top: 8px; }
  /* Mobile controls */
  #mobileControls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    display: none;
    justify-content: space-between;
    padding: 10px 16px 14px;
    pointer-events: none;
    z-index: 15;
  }
  .ctrl-group { display: flex; gap: 8px; pointer-events: all; }
  .ctrl-btn {
    width: 54px; height: 54px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.35);
    color: #fff;
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: background 0.1s;
  }
  .ctrl-btn:active, .ctrl-btn.pressed { background: rgba(255,255,255,0.38); }
  .ctrl-jump { background: rgba(100,200,150,0.3); border-color: rgba(100,200,150,0.6); }
  .ctrl-run { background: rgba(255,180,80,0.3); border-color: rgba(255,180,80,0.6); font-size: 14px; font-weight: bold; }
  /* Level select grid */
  #levelGrid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 15px 0; width: 100%; max-width: 480px; }
  .level-btn {
    aspect-ratio: 1;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px;
    transition: background 0.15s, border-color 0.15s;
  }
  .level-btn.unlocked { background: rgba(100,180,255,0.15); border-color: rgba(100,180,255,0.5); cursor: pointer; }
  .level-btn.unlocked:hover { background: rgba(100,180,255,0.3); }
  .level-btn.completed { background: rgba(39,174,96,0.2); border-color: rgba(39,174,96,0.6); }
  .level-btn.locked { opacity: 0.4; cursor: not-allowed; }
  .level-btn .lv-num { font-size: 20px; }
  .level-btn .lv-word { font-size: 9px; color: #aaa; letter-spacing: 1px; }
  .stars-row { font-size: 12px; }
  #continueBtn { display: none; }
  #scoreDisplay { color: #ffe66d; font-size: 22px; font-weight: bold; margin-top: 10px; }
  .info-bar { color: #aaa; font-size: 13px; margin-top: 8px; }
  /* Checkpoint flash */
  #checkpointFlash {
    position: absolute;
    inset: 0;
    background: rgba(255,220,80,0.3);
    pointer-events: none;
    z-index: 30;
    opacity: 0;
    transition: opacity 0.3s;
  }
  /* Responsive */
  @media (max-width: 820px) {
    #gameWrapper { border-radius: 0; }
    #mobileControls { display: flex; }
  }
  @media (max-width: 500px) {
    .screen h1 { font-size: 30px; }
    .screen h2 { font-size: 20px; }
    .spell-slot, .bank-letter { width: 40px; height: 40px; font-size: 20px; }
  }
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="gameCanvas" width="800" height="500"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-block hud-lives">❤️ <span id="hudLives">3</span></div>
    <div class="hud-block hud-word">
      <span style="font-size:10px;display:block;text-align:center;color:#aaa">COLLECT</span>
      <span id="hudWord">CAT</span>
    </div>
    <div class="hud-block">⭐ <span id="hudScore">0</span></div>
  </div>
  <div class="hud-block" style="position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:11;text-align:center;pointer-events:none;display:none" id="hudLetters"></div>

  <!-- Checkpoint flash -->
  <div id="checkpointFlash"></div>

  <!-- Title Screen -->
  <div class="screen" id="titleScreen">
    <div style="font-size:70px;margin-bottom:8px;">📚</div>
    <h1>Grammar Quest</h1>
    <p class="logo-subtitle">COLLECT · SPELL · CONQUER</p>
    <button class="btn" onclick="showLevelSelect()">▶ START GAME</button>
    <button class="btn btn-blue" onclick="showLevelSelect()">📋 LEVEL SELECT</button>
    <p class="info-bar" id="savedInfo"></p>
  </div>

  <!-- Level Select -->
  <div class="screen" id="levelSelectScreen" style="display:none">
    <h2>Choose a Level</h2>
    <div id="levelGrid"></div>
    <button class="btn" onclick="showScreen('titleScreen')">← Back</button>
  </div>

  <!-- Game Over -->
  <div class="screen" id="gameOverScreen" style="display:none">
    <div style="font-size:60px">💀</div>
    <h1 style="color:#ff6b6b">Game Over</h1>
    <p id="goScore" style="color:#ffe66d;font-size:20px;margin:10px 0"></p>
    <button class="btn" onclick="restartLevel()">🔄 Try Again</button>
    <button class="btn btn-blue" onclick="showLevelSelect()">📋 Levels</button>
  </div>

  <!-- Spelling Challenge -->
  <div class="screen" id="spellingScreen" style="display:none">
    <div style="font-size:48px">🔤</div>
    <h2>Spelling Challenge!</h2>
    <p id="levelInfo" style="color:#aaa;margin-bottom:6px"></p>
    <p style="color:#ddd;font-size:14px">Arrange the letters to spell the word:</p>
    <div id="spellingWord"></div>
    <div id="letterBank"></div>
    <div id="spellingFeedback"></div>
    <div style="display:flex;gap:10px;margin-top:10px">
      <button class="btn btn-green" onclick="checkSpelling()">✅ Check</button>
      <button class="btn" onclick="clearSpelling()">🔄 Clear</button>
    </div>
    <p style="color:#888;font-size:12px;margin-top:8px">Click letters to arrange them</p>
  </div>

  <!-- Level Complete -->
  <div class="screen" id="levelCompleteScreen" style="display:none">
    <div style="font-size:60px;animation:bounce 0.8s infinite">🎉</div>
    <h1 style="color:#a8e6cf">Level Complete!</h1>
    <div id="lcStars" style="font-size:36px;margin:8px 0"></div>
    <p id="lcWord" style="color:#ffe66d;font-size:24px;font-weight:bold;letter-spacing:4px;margin:6px 0"></p>
    <div id="scoreDisplay">+<span id="lcScore">0</span> pts</div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-green" id="nextLevelBtn" onclick="nextLevel()">Next Level ▶</button>
      <button class="btn btn-blue" onclick="showLevelSelect()">📋 Levels</button>
    </div>
  </div>

  <!-- Mobile Controls -->
  <div id="mobileControls">
    <div class="ctrl-group">
      <div class="ctrl-btn" id="btn-left" ontouchstart="mobilePress('left',true)" ontouchend="mobilePress('left',false)">◀</div>
      <div class="ctrl-btn" id="btn-right" ontouchstart="mobilePress('right',true)" ontouchend="mobilePress('right',false)">▶</div>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-btn ctrl-run" id="btn-run" ontouchstart="mobilePress('run',true)" ontouchend="mobilePress('run',false)">RUN</div>
      <div class="ctrl-btn ctrl-jump" id="btn-jump" ontouchstart="mobilePress('jump',true)" ontouchend="mobilePress('jump',false)">▲</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// GRAMMAR QUEST — Complete 2D Platformer
// ═══════════════════════════════════════════════════════════

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 500;

// ── Level Definitions ──────────────────────────────────────
const LEVEL_WORDS = ['CAT','BOOK','APPLE','SCHOOL','FRIEND','GARDEN','COMPUTER','LANGUAGE','EDUCATION','KNOWLEDGE'];

// Palette per level: [sky1, sky2, ground, platform, accent]
const LEVEL_PALETTES = [
  ['#87CEEB','#b0e2f7','#4a7c30','#6ab04c','#ffd700'],  // 1 - meadow
  ['#ddf4ff','#b8e4f9','#5a4a2a','#8B6914','#ff9f43'],  // 2 - library
  ['#ffecb3','#ffe082','#c0392b','#e74c3c','#fff'],      // 3 - apple orchard
  ['#c8e6c9','#a5d6a7','#3d6b44','#5a9e5c','#2196f3'],  // 4 - schoolyard
  ['#ffe0f0','#ffc1e3','#7b3f6e','#9b59b6','#f1c40f'],  // 5 - friendship park
  ['#e8f5e9','#c8e6c9','#2d6a4f','#40916c','#f4a261'],  // 6 - garden
  ['#e3f2fd','#bbdefb','#1a237e','#283593','#4fc3f7'],  // 7 - cyber city
  ['#fce4ec','#f8bbd0','#6a0dad','#8e24aa','#82b1ff'],  // 8 - language lab
  ['#fff3e0','#ffe0b2','#e65100','#f57c00','#80cbc4'],  // 9 - education hall
  ['#e0e0e0','#bdbdbd','#37474f','#455a64','#ffab40'],  // 10 - knowledge castle
];

// Letter colors in bank
const LETTER_COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff9f43','#a29bfe','#fd79a8','#00cec9','#e17055','#74b9ff'];

// ── Game State ──────────────────────────────────────────────
let state = {
  screen: 'title',   // title | playing | spelling | levelComplete | gameOver | levelSelect
  level: 0,
  lives: 3,
  score: 0,
  highScore: 0,
  unlockedLevels: 1,
  completedLevels: [],
  levelScores: [],
};

// ── Saved progress ──────────────────────────────────────────
function saveProgress() {
  try {
    localStorage.setItem('grammarQuest', JSON.stringify({
      unlockedLevels: state.unlockedLevels,
      completedLevels: state.completedLevels,
      highScore: state.highScore,
      levelScores: state.levelScores,
    }));
  } catch(e) {}
}
function loadProgress() {
  try {
    const d = JSON.parse(localStorage.getItem('grammarQuest') || '{}');
    if (d.unlockedLevels) state.unlockedLevels = d.unlockedLevels;
    if (d.completedLevels) state.completedLevels = d.completedLevels;
    if (d.highScore) state.highScore = d.highScore;
    if (d.levelScores) state.levelScores = d.levelScores;
  } catch(e) {}
}

// ── Audio ───────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audio;
function initAudio() {
  if (!audio) audio = new AudioCtx();
}
function beep(freq, dur, type='square', vol=0.15, delay=0) {
  if (!audio) return;
  try {
    const o = audio.createOscillator();
    const g = audio.createGain();
    o.connect(g); g.connect(audio.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audio.currentTime + delay);
    g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + delay + dur);
    o.start(audio.currentTime + delay);
    o.stop(audio.currentTime + delay + dur + 0.01);
  } catch(e) {}
}
function playJump() { beep(300,0.05,'square',0.1); beep(500,0.1,'square',0.1,0.05); }
function playCollect() { beep(660,0.05,'sine',0.12); beep(880,0.08,'sine',0.12,0.05); beep(1100,0.1,'sine',0.12,0.1); }
function playEnemyKill() { beep(200,0.05,'square',0.15); beep(150,0.1,'square',0.15,0.05); }
function playDie() { beep(440,0.05,'square',0.15); beep(330,0.08,'square',0.15,0.06); beep(220,0.2,'square',0.15,0.14); }
function playCheckpoint() { beep(660,0.07,'sine',0.15); beep(880,0.07,'sine',0.15,0.08); beep(1100,0.12,'sine',0.15,0.16); }
function playWin() { [660,770,880,1100].forEach((f,i)=>beep(f,0.12,'sine',0.15,i*0.1)); }
function playSpellOk() { [880,1100,1320].forEach((f,i)=>beep(f,0.12,'sine',0.15,i*0.08)); }
function playSpellWrong() { beep(200,0.15,'sawtooth',0.12); beep(180,0.15,'sawtooth',0.12,0.12); }

// ── Input ───────────────────────────────────────────────────
const keys = {};
const mobileKeys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowLeft','ArrowRight','ArrowUp'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function mobilePress(k, down) {
  mobileKeys[k] = down;
  const btn = document.getElementById('btn-'+k);
  if (btn) btn.classList.toggle('pressed', down);
  if (down) initAudio();
}

function isLeft()  { return keys['ArrowLeft']  || keys['KeyA'] || mobileKeys['left']; }
function isRight() { return keys['ArrowRight'] || keys['KeyD'] || mobileKeys['right']; }
function isJump()  { return keys['ArrowUp'] || keys['Space'] || keys['KeyW'] || mobileKeys['jump']; }
function isRun()   { return keys['ShiftLeft'] || keys['ShiftRight'] || mobileKeys['run']; }

// ── Player ──────────────────────────────────────────────────
let player, entities, camera, levelData, frameCount;
let jumpHeld = false, jumpAvailable = true;
let checkpointX = 0;
let collectedLetters = [];
let spellingAttempt = [];
let spellingUsed = [];

function createPlayer(x, y) {
  return {
    x, y, w: 28, h: 36,
    vx: 0, vy: 0,
    onGround: false,
    facingRight: true,
    state: 'idle', // idle | walk | jump | fall
    animFrame: 0,
    animTimer: 0,
    invincible: 0,     // frames of invincibility after hit
    dead: false,
    deathTimer: 0,
  };
}

// ── Level Generation ─────────────────────────────────────────
function buildLevel(levelIdx) {
  const word = LEVEL_WORDS[levelIdx];
  const difficulty = levelIdx + 1; // 1-10
  const levelW = 1800 + levelIdx * 600; // wider levels later
  const pal = LEVEL_PALETTES[levelIdx];

  const platforms = [];
  const enemies = [];
  const letters = [];
  const decorations = [];
  const checkpoints = [];

  // Ground
  platforms.push({ x:0, y: H-60, w: levelW, h: 60, type:'ground', col: pal[2], top: pal[3] });

  // Gaps (holes in ground)
  const gapCount = Math.floor(difficulty * 1.2);
  const gapPositions = [];
  for (let i = 0; i < gapCount; i++) {
    const gx = 400 + i * Math.floor((levelW-600)/gapCount) + rand(-50,50);
    const gw = 60 + difficulty * 8;
    gapPositions.push({ x: gx, w: gw });
    // Split ground around gap
    const prev = platforms[0];
    // Mark gap region (handled in draw as a void)
  }
  // Rebuild ground with gaps
  platforms.length = 0;
  let gx = 0;
  const sortedGaps = gapPositions.sort((a,b)=>a.x-b.x);
  sortedGaps.forEach(gap => {
    if (gap.x > gx) {
      platforms.push({ x:gx, y:H-60, w:gap.x-gx, h:60, type:'ground', col:pal[2], top:pal[3] });
    }
    gx = gap.x + gap.w;
  });
  platforms.push({ x:gx, y:H-60, w:levelW-gx, h:60, type:'ground', col:pal[2], top:pal[3] });

  // Floating platforms
  const platCount = 8 + difficulty * 3;
  for (let i = 0; i < platCount; i++) {
    const px = 300 + i * Math.floor((levelW-400)/platCount) + rand(-60,60);
    const py = H - 120 - rand(0, 140 + difficulty*8);
    const pw = 80 + rand(-20, 60) - difficulty*2;
    platforms.push({ x:px, y:py, w:Math.max(50,pw), h:16, type:'platform', col:pal[3], top:pal[3],
      moving: Math.random() < 0.15 + difficulty*0.03,
      moveDir: 1, moveRange: 60+difficulty*5, moveSpeed: 0.5+difficulty*0.05,
      baseX: px });
  }

  // Stair-like structures for variety
  for (let i = 0; i < Math.floor(difficulty/2); i++) {
    const sx = 500 + rand(0, levelW-800);
    for (let s = 0; s < 4; s++) {
      platforms.push({ x:sx+s*60, y:H-100-s*50, w:60, h:16, type:'platform', col:pal[3], top:pal[3] });
    }
  }

  // Enemies
  const enemyCount = 2 + Math.floor(difficulty * 1.5);
  const enemyTypes = ['walker','jumper','patrol'];
  for (let i = 0; i < enemyCount; i++) {
    const type = enemyTypes[Math.min(Math.floor(difficulty/3), enemyTypes.length-1) > 0 ? rand(0,Math.min(2,Math.floor(difficulty/3))) : 0];
    enemies.push({
      x: 600 + i * Math.floor((levelW-700)/enemyCount) + rand(-50,50),
      y: H - 96,
      w: 28, h: 28,
      vx: (Math.random()<0.5?1:-1) * (0.8+difficulty*0.15),
      vy: 0,
      onGround: true,
      type,
      alive: true,
      animFrame: 0,
      animTimer: 0,
      jumpTimer: type==='jumper' ? rand(60,120) : 999,
      patrolLeft: 0, patrolRight: 0, // set after
    });
  }

  // Letters scattered in the level
  // Distribute letters across the level width
  const letterCount = word.length;
  const spacing = (levelW - 400) / letterCount;
  const shuffledLetters = word.split('').sort(()=>Math.random()-0.5);
  shuffledLetters.forEach((ch, i) => {
    const lx = 300 + i * spacing + rand(-30,30);
    // Find a platform near this x to place letter on top of
    let ly = H - 110;
    // Try to place above a platform
    const nearPlat = platforms.find(p => lx >= p.x-20 && lx <= p.x+p.w+20 && p.type==='platform');
    if (nearPlat) ly = nearPlat.y - 30;
    letters.push({ x:lx, y:ly, ch, collected:false, animOffset: Math.random()*Math.PI*2 });
  });

  // Decorations (clouds, trees, bg objects)
  for (let i = 0; i < 15; i++) {
    decorations.push({ type:'cloud', x: rand(0,levelW), y: rand(30,120), w:rand(60,120), speed: rand(1,3)*0.1 });
  }
  for (let i = 0; i < Math.floor(levelW/150); i++) {
    decorations.push({ type:'tree', x: 50+i*150+rand(-30,30), y: H-60, h: 40+rand(-10,20) });
  }
  // Castle at end
  decorations.push({ type:'castle', x: levelW-200, y: H-180 });
  // Checkpoint flag
  checkpoints.push({ x: Math.floor(levelW/2), y: H-100, triggered: false });

  // Goal door
  const goal = { x: levelW-140, y: H-130, w:50, h:70 };

  return { levelW, platforms, enemies, letters, decorations, checkpoints, goal, word, pal,
    bgStars: Array.from({length:30}, ()=>({x:rand(0,levelW),y:rand(0,200),r:rand(1,3),blink:Math.random()*Math.PI*2})) };
}

function rand(a,b) { return Math.floor(Math.random()*(b-a+1))+a; }

// ── Start Level ──────────────────────────────────────────────
function startLevel(idx) {
  initAudio();
  state.level = idx;
  collectedLetters = [];
  spellingAttempt = [];
  spellingUsed = [];
  frameCount = 0;
  levelData = buildLevel(idx);
  checkpointX = 80;
  player = createPlayer(80, H - 130);
  camera = { x: 0 };
  updateHUD();
  showScreen('none');
  state.screen = 'playing';
  document.getElementById('mobileControls').style.display = 'flex';
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('hudLetters').style.display = 'block';
  requestAnimationFrame(gameLoop);
}

function restartLevel() {
  state.lives--;
  if (state.lives <= 0) {
    state.lives = 0;
    showGameOver();
    return;
  }
  startLevel(state.level);
}

function respawnAtCheckpoint() {
  player = createPlayer(checkpointX, H-130);
  collectedLetters = [];
}

// ── Game Loop ────────────────────────────────────────────────
let lastTime = 0;
function gameLoop(ts) {
  if (state.screen !== 'playing') return;
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;
  frameCount++;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

// ── Physics & Update ─────────────────────────────────────────
const GRAVITY = 0.45;
const JUMP_FORCE = -10.5;
const WALK_SPEED = 2.8;
const RUN_SPEED = 4.8;

function update(dt) {
  if (player.dead) {
    player.deathTimer--;
    if (player.deathTimer <= 0) restartLevel();
    return;
  }

  // Player movement
  const speed = isRun() ? RUN_SPEED : WALK_SPEED;
  let moving = false;

  if (isLeft())  { player.vx -= (speed - player.vx) * 0.25 * dt; player.facingRight=false; moving=true; }
  if (isRight()) { player.vx += (speed + player.vx) * 0.25 * dt; player.facingRight=true;  moving=true; }
  if (!moving)   { player.vx *= 0.8; }
  player.vx = Math.max(-RUN_SPEED*1.2, Math.min(RUN_SPEED*1.2, player.vx));

  // Jump
  const jumpNow = isJump();
  if (jumpNow && !jumpHeld && player.onGround && jumpAvailable) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    jumpHeld = true;
    jumpAvailable = false;
    playJump();
  }
  if (!jumpNow) { jumpHeld = false; jumpAvailable = true; }
  // Variable jump height: cut velocity if release early
  if (!jumpNow && player.vy < -3) player.vy += 0.4;

  player.vy += GRAVITY * dt;
  player.vy = Math.min(player.vy, 15);

  // Move X
  player.x += player.vx * dt;
  player.x = Math.max(0, player.x);
  if (player.x + player.w > levelData.levelW) player.x = levelData.levelW - player.w;

  // Horizontal collision with platforms
  resolveHCollision();

  // Move Y
  player.y += player.vy * dt;
  player.onGround = false;

  // Vertical collision
  resolveVCollision();

  // Fall into void
  if (player.y > H + 60) {
    killPlayer();
    return;
  }

  // Update enemies
  levelData.enemies.forEach(e => {
    if (!e.alive) return;
    e.vy = (e.vy || 0) + GRAVITY * dt;
    if (e.type === 'jumper') {
      e.jumpTimer--;
      if (e.jumpTimer <= 0 && e.onGround) { e.vy = -8; e.jumpTimer = rand(60,120); }
    }
    e.x += e.vx * dt;
    e.y += e.vy * dt;

    // Enemy-platform collision
    e.onGround = false;
    levelData.platforms.forEach(p => {
      updateMovingPlatform(p, dt);
      if (overlap(e.x,e.y,e.w,e.h, p.x,p.y,p.w,p.h)) {
        const overlapBottom = (e.y+e.h) - p.y;
        if (overlapBottom > 0 && overlapBottom < e.h*0.7 && e.vy >= 0) {
          e.y = p.y - e.h;
          e.vy = 0;
          e.onGround = true;
        }
      }
    });
    if (e.y + e.h > H) { e.y = H-e.h-60; e.vy=0; e.onGround=true; }

    // Patrol: reverse at edges / walls
    if (e.type === 'patrol' || e.type === 'walker') {
      const edgeCheck = { x: e.x + (e.vx>0 ? e.w+2 : -2), y: e.y+e.h+2, w:1, h:1 };
      const onEdge = !levelData.platforms.some(p => overlap(edgeCheck.x,edgeCheck.y,1,1,p.x,p.y,p.w,p.h));
      if (onEdge && e.onGround) e.vx *= -1;
      if (e.x < 0 || e.x + e.w > levelData.levelW) e.vx *= -1;
    }

    // Enemy animation
    e.animTimer += dt;
    if (e.animTimer > 10) { e.animFrame = (e.animFrame+1)%2; e.animTimer=0; }

    // Player-enemy collision
    if (!player.dead && player.invincible <= 0) {
      if (overlap(player.x,player.y,player.w,player.h, e.x,e.y,e.w,e.h)) {
        const stomped = player.vy > 0 && player.y + player.h < e.y + e.h * 0.5 + 5;
        if (stomped) {
          e.alive = false;
          player.vy = -7;
          state.score += 100;
          playEnemyKill();
        } else {
          // Player takes damage
          player.invincible = 90;
          state.lives--;
          updateHUD();
          playDie();
          if (state.lives <= 0) { killPlayer(); }
        }
      }
    }
  });

  if (player.invincible > 0) player.invincible--;

  // Collect letters
  levelData.letters.forEach(l => {
    if (!l.collected && overlap(player.x,player.y,player.w,player.h, l.x-12,l.y-12,24,24)) {
      l.collected = true;
      collectedLetters.push(l.ch);
      state.score += 50;
      playCollect();
      updateHUD();
    }
  });

  // Checkpoints
  levelData.checkpoints.forEach(cp => {
    if (!cp.triggered && Math.abs(player.x - cp.x) < 30 && player.y < cp.y + 50) {
      cp.triggered = true;
      checkpointX = cp.x;
      playCheckpoint();
      flashCheckpoint();
    }
  });

  // Goal
  const g = levelData.goal;
  if (collectedLetters.length === levelData.word.length &&
      overlap(player.x,player.y,player.w,player.h, g.x,g.y,g.w,g.h)) {
    triggerSpelling();
  }

  // Camera
  const targetCamX = player.x - W/3;
  camera.x += (targetCamX - camera.x) * 0.12;
  camera.x = Math.max(0, Math.min(levelData.levelW - W, camera.x));

  // Player animation
  player.animTimer = (player.animTimer||0) + dt;
  if (Math.abs(player.vx) > 0.5) {
    const animSpeed = isRun() ? 6 : 9;
    if (player.animTimer > animSpeed) { player.animFrame = (player.animFrame+1)%4; player.animTimer=0; }
    player.state = 'walk';
  } else {
    player.animFrame = 0;
    player.state = 'idle';
  }
  if (!player.onGround) player.state = player.vy < 0 ? 'jump' : 'fall';
}

function updateMovingPlatform(p, dt) {
  if (!p.moving) return;
  p.x += p.vx||0;
  // init move
  if (p.moveVel === undefined) p.moveVel = p.moveSpeed;
  p.x += p.moveVel * dt;
  if (p.x > p.baseX + p.moveRange) { p.moveVel = -p.moveSpeed; }
  if (p.x < p.baseX - p.moveRange) { p.moveVel =  p.moveSpeed; }
  p.x = Math.max(0, Math.min(levelData.levelW - p.w, p.x));
}

function resolveHCollision() {
  levelData.platforms.forEach(p => {
    if (overlap(player.x,player.y+2,player.w,player.h-4, p.x,p.y,p.w,p.h)) {
      if (player.vx > 0) player.x = p.x - player.w;
      else if (player.vx < 0) player.x = p.x + p.w;
      player.vx = 0;
    }
  });
}

function resolveVCollision() {
  levelData.platforms.forEach(p => {
    if (overlap(player.x+2,player.y,player.w-4,player.h, p.x,p.y,p.w,p.h)) {
      const overlapBottom = (player.y+player.h) - p.y;
      const overlapTop    = (p.y+p.h) - player.y;
      if (overlapBottom > 0 && overlapBottom < player.h*0.75 && player.vy >= 0) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      } else if (overlapTop > 0 && overlapTop < 12 && player.vy < 0) {
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  });
}

function overlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

function killPlayer() {
  if (player.dead) return;
  player.dead = true;
  player.deathTimer = 80;
  player.vy = -10;
  playDie();
}

function flashCheckpoint() {
  const el = document.getElementById('checkpointFlash');
  el.style.opacity = 0.8;
  setTimeout(()=>{ el.style.opacity = 0; }, 400);
}

// ── Rendering ────────────────────────────────────────────────
function render() {
  ctx.clearRect(0,0,W,H);
  const pal = levelData.pal;
  const cx = Math.floor(camera.x);

  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0, pal[0]);
  sky.addColorStop(1, pal[1]);
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,H);

  // Background stars (night levels)
  if (state.level >= 6) {
    levelData.bgStars.forEach(s => {
      const bx = (s.x - cx*0.2) % W;
      const alpha = 0.5 + 0.5*Math.sin(frameCount*0.05 + s.blink);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.beginPath();
      ctx.arc(bx, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    });
  }

  // Decorations (bg layer, parallax)
  levelData.decorations.forEach(d => drawDecoration(d, cx, pal));

  // Platforms
  levelData.platforms.forEach(p => drawPlatform(p, cx, pal));

  // Goal door (only if all letters collected)
  drawGoal(cx);

  // Checkpoints
  levelData.checkpoints.forEach(cp => drawCheckpoint(cp, cx));

  // Letters
  levelData.letters.forEach(l => {
    if (l.collected) return;
    const lx = l.x - cx;
    const ly = l.y + Math.sin(frameCount*0.06 + l.animOffset)*5;
    // Glow
    const grd = ctx.createRadialGradient(lx, ly, 2, lx, ly, 18);
    grd.addColorStop(0, 'rgba(255,255,150,0.6)');
    grd.addColorStop(1, 'rgba(255,255,150,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(lx, ly, 18, 0, Math.PI*2); ctx.fill();
    // Letter bubble
    ctx.fillStyle = '#fff9c4';
    ctx.strokeStyle = '#f9a825';
    ctx.lineWidth = 2;
    ctx.beginPath(); roundRect(ctx, lx-14, ly-14, 28, 28, 8); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#333';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(l.ch, lx, ly+1);
  });

  // Enemies
  levelData.enemies.forEach(e => { if (e.alive) drawEnemy(e, cx, pal); });

  // Player
  drawPlayer(cx);

  // Vignette
  const vig = ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.8);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,0.3)');
  ctx.fillStyle = vig;
  ctx.fillRect(0,0,W,H);

  // Level progress bar
  const prog = (player.x) / levelData.levelW;
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0, H-4, W, 4);
  ctx.fillStyle = pal[4] || '#ffd700';
  ctx.fillRect(0, H-4, W*prog, 4);

  // "Collect all letters!" hint
  if (collectedLetters.length < levelData.word.length) {
    const remaining = levelData.word.length - collectedLetters.length;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(W/2-80, 5, 160, 22);
    ctx.fillStyle = '#fff';
    ctx.font = '12px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(`${remaining} letter${remaining!==1?'s':''} remaining`, W/2, 10);
  } else {
    ctx.fillStyle = 'rgba(50,200,80,0.7)';
    ctx.fillRect(W/2-80, 5, 160, 22);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('🏁 Reach the door!', W/2, 10);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawPlatform(p, cx, pal) {
  const px = p.x - cx, py = p.y;
  if (px + p.w < 0 || px > W) return;

  if (p.type === 'ground') {
    // Ground top decorative grass
    ctx.fillStyle = p.col;
    ctx.fillRect(px, py, p.w, p.h);
    ctx.fillStyle = p.top;
    ctx.fillRect(px, py, p.w, 12);
    // Grass blades
    ctx.fillStyle = '#5db847';
    for (let i = 0; i < p.w; i+=8) {
      ctx.fillRect(px+i, py-3, 3, 5);
      ctx.fillRect(px+i+3, py-5, 2, 7);
    }
  } else {
    // Floating platform
    ctx.fillStyle = p.top;
    ctx.fillRect(px, py, p.w, p.h);
    ctx.fillStyle = shadeColor(p.top, -30);
    ctx.fillRect(px, py+12, p.w, p.h-12);
    // Top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(px+2, py+2, p.w-4, 3);
    // Underside shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(px, py+p.h-3, p.w, 3);
    // Moving indicator
    if (p.moving) {
      ctx.fillStyle = 'rgba(255,200,0,0.5)';
      ctx.fillRect(px+4, py+5, p.w-8, 4);
    }
  }
}

function drawDecoration(d, cx, pal) {
  if (d.type === 'cloud') {
    const dx = (d.x - cx*0.4 + frameCount*d.speed*0.3) % (levelData.levelW+200) - 100;
    if (dx < -d.w-20 || dx > W+20) return;
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath(); ctx.arc(dx+d.w*0.3, d.y, d.w*0.22, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(dx+d.w*0.5, d.y-d.w*0.1, d.w*0.28, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(dx+d.w*0.7, d.y, d.w*0.22, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(dx+d.w*0.1, d.y, d.w*0.8, d.w*0.2);
  } else if (d.type === 'tree') {
    const tx = d.x - cx*0.6;
    if (tx < -60 || tx > W+60) return;
    // Trunk
    ctx.fillStyle = '#795548';
    ctx.fillRect(tx-4, d.y-d.h, 8, d.h);
    // Leaves
    const leafColors = [pal[3], shadeColor(pal[3],20), shadeColor(pal[3],-15)];
    ctx.fillStyle = leafColors[0];
    ctx.beginPath(); ctx.arc(tx, d.y-d.h-12, 18, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = leafColors[1];
    ctx.beginPath(); ctx.arc(tx-10, d.y-d.h-5, 14, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(tx+10, d.y-d.h-5, 14, 0, Math.PI*2); ctx.fill();
  } else if (d.type === 'castle') {
    const cx2 = d.x - cx;
    if (cx2 < -250 || cx2 > W+50) return;
    drawCastle(cx2, d.y, pal);
  }
}

function drawCastle(x, y, pal) {
  const col = state.level >= 6 ? '#455a64' : '#bdc3c7';
  const dark = shadeColor(col, -30);
  // Main body
  ctx.fillStyle = col;
  ctx.fillRect(x, y, 120, 120);
  ctx.fillStyle = dark;
  ctx.fillRect(x+45, y+50, 30, 70); // door
  ctx.fillStyle = '#4a148c';
  ctx.beginPath(); ctx.arc(x+60, y+50, 15, Math.PI, 0); ctx.fill();
  // Battlements
  for (let i = 0; i < 4; i++) {
    ctx.fillStyle = col;
    ctx.fillRect(x+i*32, y-20, 22, 22);
  }
  // Windows
  ctx.fillStyle = '#ffe082';
  ctx.fillRect(x+15, y+20, 20, 25);
  ctx.fillRect(x+85, y+20, 20, 25);
  // Flag
  ctx.fillStyle = '#e53935';
  ctx.fillRect(x+56, y-50, 3, 35);
  ctx.fillRect(x+59, y-50, 22, 15);
  // Stars on flag
  ctx.fillStyle = '#fff';
  ctx.font = '10px Arial';
  ctx.fillText('📚', x+60, y-42);
}

function drawCheckpoint(cp, cx) {
  const cx2 = cp.x - cx;
  if (cx2 < -20 || cx2 > W+20) return;
  // Flag pole
  ctx.fillStyle = '#607d8b';
  ctx.fillRect(cx2-1, cp.y-40, 3, 50);
  // Flag
  ctx.fillStyle = cp.triggered ? '#4caf50' : '#ef5350';
  ctx.beginPath();
  ctx.moveTo(cx2+2, cp.y-40);
  ctx.lineTo(cx2+18, cp.y-32);
  ctx.lineTo(cx2+2, cp.y-24);
  ctx.closePath();
  ctx.fill();
  // Sparkle if triggered
  if (cp.triggered) {
    ctx.fillStyle = 'rgba(76,175,80,0.4)';
    ctx.beginPath(); ctx.arc(cx2, cp.y-35, 10+Math.sin(frameCount*0.1)*3, 0, Math.PI*2); ctx.fill();
  }
}

function drawGoal(cx) {
  const g = levelData.goal;
  const gx = g.x - cx;
  if (gx < -60 || gx > W+60) return;
  const allCollected = collectedLetters.length >= levelData.word.length;

  // Door frame
  ctx.fillStyle = allCollected ? '#1b5e20' : '#4e342e';
  ctx.fillRect(gx-3, g.y-3, g.w+6, g.h+3);
  // Door fill
  ctx.fillStyle = allCollected ? '#43a047' : '#6d4c41';
  ctx.fillRect(gx, g.y, g.w, g.h);
  // Door arch
  ctx.fillStyle = allCollected ? '#2e7d32' : '#5d4037';
  ctx.beginPath(); ctx.arc(gx+g.w/2, g.y, g.w/2, Math.PI, 0); ctx.fill();
  // Star/glow when active
  if (allCollected) {
    const glow = ctx.createRadialGradient(gx+g.w/2, g.y+g.h/2, 5, gx+g.w/2, g.y+g.h/2, 40);
    glow.addColorStop(0,'rgba(100,255,100,0.5)');
    glow.addColorStop(1,'rgba(100,255,100,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(gx-30, g.y-30, g.w+60, g.h+60);
    ctx.font = '22px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('⭐', gx+g.w/2, g.y-15 + Math.sin(frameCount*0.1)*5);
  }
  // Door knob
  ctx.fillStyle = allCollected ? '#ffd700' : '#9e9e9e';
  ctx.beginPath(); ctx.arc(gx+g.w-10, g.y+g.h*0.55, 4, 0, Math.PI*2); ctx.fill();
  // Sign
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(gx, g.y-28, g.w, 20);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(allCollected ? 'ENTER!' : 'LOCKED', gx+g.w/2, g.y-14);
}

function drawPlayer(cx) {
  const px = player.x - cx;
  const py = player.y;
  const flip = !player.facingRight;
  const dead = player.dead;
  const blink = player.invincible > 0 && Math.floor(player.invincible/5)%2===0;

  if (blink) return;

  ctx.save();
  if (flip) { ctx.translate(px + player.w/2, py + player.h/2); ctx.scale(-1,1); ctx.translate(-(px + player.w/2), -(py + player.h/2)); }
  if (dead) { ctx.translate(px+player.w/2, py+player.h/2); ctx.rotate(0.4); ctx.translate(-(px+player.w/2), -(py+player.h/2)); }

  const bx = px, by = py;

  // Shadow
  if (!dead) {
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(bx+14, by+player.h+2, 14, 4, 0, 0, Math.PI*2); ctx.fill();
  }

  // Body (overalls)
  ctx.fillStyle = '#1565c0';
  roundRect(ctx, bx+3, by+16, 22, 20, 4); ctx.fill();

  // Shirt
  ctx.fillStyle = '#e53935';
  roundRect(ctx, bx+4, by+14, 20, 10, 3); ctx.fill();

  // Head
  ctx.fillStyle = '#ffcc80';
  ctx.beginPath(); ctx.arc(bx+14, by+10, 11, 0, Math.PI*2); ctx.fill();

  // Cap
  ctx.fillStyle = '#e53935';
  ctx.beginPath();
  ctx.ellipse(bx+14, by+3, 13, 5, 0, Math.PI, 0); ctx.fill();
  ctx.fillRect(bx+2, by+2, 24, 5);
  ctx.fillStyle = '#c62828';
  ctx.fillRect(bx+2, by+6, 24, 2);
  // Brim
  ctx.fillStyle = '#e53935';
  ctx.beginPath(); ctx.ellipse(bx+14, by+7, 15, 4, 0, 0, Math.PI*2); ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(bx+18, by+9, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#212121';
  ctx.beginPath(); ctx.arc(bx+19, by+9, 2, 0, Math.PI*2); ctx.fill();

  // Mustache
  ctx.fillStyle = '#5d4037';
  ctx.beginPath(); ctx.arc(bx+12, by+14, 4, 0, Math.PI); ctx.fill();
  ctx.beginPath(); ctx.arc(bx+18, by+14, 4, 0, Math.PI); ctx.fill();

  // Arms / legs based on state
  const legOffset = ['walk','run'].includes(player.state) ? [0,8,16,8][player.animFrame] : 0;

  // Legs
  ctx.fillStyle = '#1565c0';
  ctx.fillRect(bx+5, by+34, 8, 10 + (player.state==='walk' ? Math.sin(frameCount*0.3)*4 : 0));
  ctx.fillRect(bx+15, by+34, 8, 10 - (player.state==='walk' ? Math.sin(frameCount*0.3)*4 : 0));

  // Shoes
  ctx.fillStyle = '#5d4037';
  const lly = by+42 + (player.state==='walk' ? Math.sin(frameCount*0.3)*4 : 0);
  const rly = by+42 - (player.state==='walk' ? Math.sin(frameCount*0.3)*4 : 0);
  roundRect(ctx, bx+3, lly, 12, 6, 2); ctx.fill();
  roundRect(ctx, bx+13, rly, 12, 6, 2); ctx.fill();

  // Arms
  ctx.fillStyle = '#e53935';
  const armAngle = player.state==='walk' ? Math.sin(frameCount*0.3)*0.4 : 0;
  ctx.save();
  ctx.translate(bx+5, by+20);
  ctx.rotate(-armAngle);
  ctx.fillRect(0,0, 6, 14);
  ctx.restore();
  ctx.save();
  ctx.translate(bx+17, by+20);
  ctx.rotate(armAngle);
  ctx.fillRect(0,0, 6, 14);
  ctx.restore();

  // Gloves
  ctx.fillStyle = '#fff';
  const lag = player.state==='walk' ? Math.sin(frameCount*0.3)*6 : 0;
  ctx.beginPath(); ctx.arc(bx+8, by+34+lag, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx+20, by+34-lag, 4, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawEnemy(e, cx, pal) {
  const ex = e.x - cx, ey = e.y;
  if (ex+e.w < -10 || ex > W+10) return;

  const t = e.type;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(ex+14, ey+e.h+2, 12, 4, 0, 0, Math.PI*2); ctx.fill();

  if (t === 'jumper') {
    // Frog-like enemy
    ctx.fillStyle = '#2e7d32';
    ctx.beginPath(); ctx.arc(ex+14, ey+16, 14, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#43a047';
    ctx.beginPath(); ctx.arc(ex+14, ey+14, 10, 0, Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(ex+9, ey+8, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex+19, ey+8, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e53935';
    ctx.beginPath(); ctx.arc(ex+9, ey+8, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex+19, ey+8, 3, 0, Math.PI*2); ctx.fill();
    // Legs animate
    const lp = e.animFrame===0 ? 0 : 4;
    ctx.fillStyle = '#2e7d32';
    ctx.fillRect(ex+2, ey+22, 8, 8+lp);
    ctx.fillRect(ex+18, ey+22, 8, 8+lp);
  } else if (t === 'patrol') {
    // Crab-like enemy
    ctx.fillStyle = '#e53935';
    roundRect(ctx, ex+2, ey+8, 24, 18, 6); ctx.fill();
    ctx.fillStyle = '#b71c1c';
    ctx.fillRect(ex+6, ey+24, 6, 6);
    ctx.fillRect(ex+16, ey+24, 6, 6);
    // Claws
    const ca = e.animFrame===0 ? 0 : -4;
    ctx.fillStyle = '#e53935';
    ctx.beginPath(); ctx.arc(ex-4+ca, ey+14, 7, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex+32-ca, ey+14, 7, 0, Math.PI*2); ctx.fill();
    // Eyes on stalks
    ctx.fillStyle = '#fff';
    ctx.fillRect(ex+7, ey, 6, 10);
    ctx.fillRect(ex+17, ey, 6, 10);
    ctx.fillStyle = '#212121';
    ctx.beginPath(); ctx.arc(ex+10, ey+2, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex+20, ey+2, 3, 0, Math.PI*2); ctx.fill();
  } else {
    // Walker — mushroom enemy
    ctx.fillStyle = '#b71c1c';
    ctx.beginPath(); ctx.arc(ex+14, ey+12, 14, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(ex+9, ey+10, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex+19, ey+10, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex+14, ey+5, 3, 0, Math.PI*2); ctx.fill();
    // Stem / feet
    ctx.fillStyle = '#efebe9';
    ctx.fillRect(ex+6, ey+22, 16, 8);
    // Angry eyes
    ctx.fillStyle = '#212121';
    ctx.beginPath(); ctx.arc(ex+10, ey+13, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex+18, ey+13, 2.5, 0, Math.PI*2); ctx.fill();
    // Walk feet
    const fa = e.animFrame===0 ? 0 : 3;
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(ex+4, ey+27, 8, 5+fa);
    ctx.fillRect(ex+16, ey+27, 8, 5-fa);
  }
}

function shadeColor(hex, pct) {
  const n = parseInt(hex.replace('#',''),16);
  const r = Math.max(0,Math.min(255, (n>>16)+(255*pct/100)|0));
  const g = Math.max(0,Math.min(255, ((n>>8)&0xFF)+(255*pct/100)|0));
  const b = Math.max(0,Math.min(255, (n&0xFF)+(255*pct/100)|0));
  return `rgb(${r},${g},${b})`;
}

// ── HUD Update ──────────────────────────────────────────────
function updateHUD() {
  document.getElementById('hudLives').textContent = state.lives;
  document.getElementById('hudWord').textContent = LEVEL_WORDS[state.level];
  document.getElementById('hudScore').textContent = state.score;
  // Show collected letters
  const el = document.getElementById('hudLetters');
  const target = LEVEL_WORDS[state.level];
  let html = '';
  collectedLetters.forEach(ch => {
    html += `<span style="background:rgba(255,255,150,0.25);border:1px solid rgba(255,255,150,0.5);border-radius:4px;padding:1px 5px;margin:1px;color:#fff;font-weight:bold">${ch}</span>`;
  });
  el.innerHTML = html;
}

// ── Spelling Screen ──────────────────────────────────────────
function triggerSpelling() {
  state.screen = 'spelling';
  document.getElementById('mobileControls').style.display = 'none';
  // Shuffle collected letters
  const shuffled = [...collectedLetters].sort(()=>Math.random()-0.5);
  spellingAttempt = Array(levelData.word.length).fill('');
  spellingUsed = Array(shuffled.length).fill(false);
  document.getElementById('levelInfo').textContent = `Level ${state.level+1}: Arrange the letters to spell the target word`;
  renderSpellingUI(shuffled);
  showScreen('spellingScreen');
}

let spellingLetters = [];
function renderSpellingUI(shuffled) {
  spellingLetters = shuffled;
  const wordDiv = document.getElementById('spellingWord');
  const bankDiv = document.getElementById('letterBank');
  document.getElementById('spellingFeedback').textContent = '';

  // Answer slots
  wordDiv.innerHTML = '';
  spellingAttempt.forEach((ch, i) => {
    const slot = document.createElement('div');
    slot.className = 'spell-slot' + (ch ? ' filled' : '');
    slot.textContent = ch || '';
    slot.dataset.idx = i;
    slot.onclick = () => unplaceFromSlot(i);
    wordDiv.appendChild(slot);
  });

  // Letter bank
  bankDiv.innerHTML = '';
  shuffled.forEach((ch, i) => {
    const btn = document.createElement('div');
    btn.className = 'bank-letter' + (spellingUsed[i] ? ' used' : '');
    btn.textContent = ch;
    btn.style.background = LETTER_COLORS[i % LETTER_COLORS.length] + '33';
    btn.style.borderColor = LETTER_COLORS[i % LETTER_COLORS.length];
    btn.style.color = LETTER_COLORS[i % LETTER_COLORS.length];
    btn.dataset.idx = i;
    btn.onclick = () => placeToSlot(i);
    bankDiv.appendChild(btn);
  });
}

function placeToSlot(bankIdx) {
  if (spellingUsed[bankIdx]) return;
  const emptySlot = spellingAttempt.indexOf('');
  if (emptySlot === -1) return;
  spellingAttempt[emptySlot] = spellingLetters[bankIdx];
  spellingUsed[bankIdx] = true;
  renderSpellingUI(spellingLetters);
  beep(440+emptySlot*50, 0.07, 'sine', 0.1);
}

function unplaceFromSlot(slotIdx) {
  const ch = spellingAttempt[slotIdx];
  if (!ch) return;
  // Find the bank letter
  const bankIdx = spellingLetters.findIndex((l,i) => l===ch && spellingUsed[i]);
  if (bankIdx !== -1) spellingUsed[bankIdx] = false;
  spellingAttempt[slotIdx] = '';
  renderSpellingUI(spellingLetters);
}

function clearSpelling() {
  spellingAttempt = Array(levelData.word.length).fill('');
  spellingUsed = Array(spellingLetters.length).fill(false);
  renderSpellingUI(spellingLetters);
}

function checkSpelling() {
  const attempt = spellingAttempt.join('');
  if (attempt.length < levelData.word.length) {
    document.getElementById('spellingFeedback').textContent = '⚠️ Place all letters first!';
    document.getElementById('spellingFeedback').style.color = '#ffd93d';
    return;
  }
  if (attempt === levelData.word) {
    document.getElementById('spellingFeedback').textContent = '✅ Correct! Amazing!';
    document.getElementById('spellingFeedback').style.color = '#a8e6cf';
    playSpellOk();
    setTimeout(showLevelComplete, 700);
  } else {
    // Mark wrong slots
    const slots = document.querySelectorAll('.spell-slot');
    slots.forEach((s,i) => {
      if (spellingAttempt[i] !== levelData.word[i]) s.classList.add('wrong');
    });
    document.getElementById('spellingFeedback').textContent = '❌ Not quite! Try again.';
    document.getElementById('spellingFeedback').style.color = '#ff6b6b';
    playSpellWrong();
    setTimeout(()=>{
      clearSpelling();
    }, 1200);
  }
}

// ── Level Complete ────────────────────────────────────────────
function showLevelComplete() {
  const bonus = Math.max(0, 500 - frameCount) + (state.lives * 200);
  const levelScore = state.score + bonus;
  state.score += bonus;
  if (state.score > state.highScore) state.highScore = state.score;

  const stars = state.lives === 3 ? 3 : state.lives === 2 ? 2 : 1;
  if (!state.completedLevels.includes(state.level)) state.completedLevels.push(state.level);
  if (!state.levelScores[state.level] || state.score > state.levelScores[state.level]) {
    state.levelScores[state.level] = state.score;
  }
  if (state.level + 1 < 10 && state.unlockedLevels <= state.level + 1) {
    state.unlockedLevels = state.level + 2;
  }
  saveProgress();

  document.getElementById('lcStars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
  document.getElementById('lcWord').textContent = levelData.word;
  document.getElementById('lcScore').textContent = bonus;
  document.getElementById('nextLevelBtn').style.display = state.level < 9 ? 'inline-block' : 'none';
  playWin();
  showScreen('levelCompleteScreen');
}

function nextLevel() {
  if (state.level < 9) startLevel(state.level + 1);
  else showLevelSelect();
}

// ── Game Over ─────────────────────────────────────────────────
function showGameOver() {
  state.lives = 3;
  document.getElementById('goScore').textContent = `Score: ${state.score}`;
  document.getElementById('mobileControls').style.display = 'none';
  showScreen('gameOverScreen');
  state.screen = 'gameOver';
}

// ── Level Select ──────────────────────────────────────────────
function showLevelSelect() {
  document.getElementById('mobileControls').style.display = 'none';
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const unlocked = i < state.unlockedLevels;
    const completed = state.completedLevels.includes(i);
    const btn = document.createElement('div');
    btn.className = 'level-btn ' + (completed ? 'completed' : unlocked ? 'unlocked' : 'locked');
    btn.innerHTML = `<span class="lv-num">${i+1}</span><span class="lv-word">${LEVEL_WORDS[i]}</span><span class="stars-row">${completed ? '⭐' : unlocked ? '▶' : '🔒'}</span>`;
    if (unlocked) btn.onclick = () => { state.lives = 3; state.score = 0; startLevel(i); };
    grid.appendChild(btn);
  }
  showScreen('levelSelectScreen');
  state.screen = 'levelSelect';
}

// ── Screen management ─────────────────────────────────────────
function showScreen(id) {
  ['titleScreen','levelSelectScreen','spellingScreen','levelCompleteScreen','gameOverScreen'].forEach(s => {
    const el = document.getElementById(s);
    if (el) el.style.display = 'none';
  });
  document.getElementById('hud').style.display = 'none';
  document.getElementById('hudLetters').style.display = 'none';
  if (id !== 'none') {
    const el = document.getElementById(id);
    if (el) { el.style.display = 'flex'; el.classList.add('anim-in'); }
  }
}

// ── Init ──────────────────────────────────────────────────────
loadProgress();
showScreen('titleScreen');
document.getElementById('savedInfo').textContent =
  state.unlockedLevels > 1 ? `Progress saved · Level ${state.unlockedLevels} unlocked · Best: ${state.highScore} pts` : '';

// Idle render on title
(function idleRender() {
  if (state.screen !== 'playing') { requestAnimationFrame(idleRender); return; }
})();

// Keyboard shortcut: Enter on title starts game
document.addEventListener('keydown', e => {
  if (e.code === 'Enter' && state.screen === 'title') showLevelSelect();
  if (e.code === 'Enter' && state.screen === 'spelling') checkSpelling();
  if (e.code === 'Escape' && state.screen === 'playing') { showScreen('titleScreen'); state.screen='title'; }
});

// Touch: prevent scroll on game
document.getElementById('gameWrapper').addEventListener('touchmove', e => e.preventDefault(), {passive:false});

// Scale canvas to fit window
function scaleGame() {
  const wrapper = document.getElementById('gameWrapper');
  const scaleX = window.innerWidth  / W;
  const scaleY = window.innerHeight / H;
  const scale  = Math.min(scaleX, scaleY, 1);
  wrapper.style.transform = `scale(${scale})`;
  wrapper.style.transformOrigin = 'center center';
  // On very small screens, stretch
  if (window.innerWidth < 820) {
    wrapper.style.transform = '';
    wrapper.style.width  = window.innerWidth+'px';
    wrapper.style.height = (window.innerWidth * H/W)+'px';
  }
}
window.addEventListener('resize', scaleGame);
scaleGame();
</script>
